{% set name = "libbraiding" %}
{% set version = "1.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/miguelmarco/libbraiding/releases/download/{{ version }}/libbraiding-{{ version }}.tar.gz
  sha256: d43a32e7770d5c9a89ae489c5ac353da9610a761f76745382cf7612eab046ffd

build:
  number: 0
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage("libbraiding", max_pin="x.") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - autoconf
    - automake
    - libtool
    - m4
    - make
    - pkg-config
  host:
  run:

test:
  commands:
    - test -f $PREFIX/lib/libbraiding${SHLIB_EXT}
    - test -f $PREFIX/include/braiding.h

about:
  home: https://github.com/miguelmarco/libbraiding
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: cbraid/braiding are C++ libraries for computations on braid groups
  dev_url: https://github.com/miguelmarco/libbraiding

extra:
  recipe-maintainers:
    - isuruf
    - saraedum
